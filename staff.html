<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PotatoSMP - Staff Panel</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <div class="logo">PotatoSMP</div>
            <ul class="nav-menu">
                <li><a href="index.html">Home</a></li>
                <li><a href="news.html">News</a></li>
                <li><a href="rules.html">Rules</a></li>
                <li><a href="report.html">Report</a></li>
                <li><a href="staff.html" class="active">Staff</a></li>
            </ul>
            <button class="mobile-menu-btn" id="mobileMenuBtn">☰</button>
        </div>
    </nav>

    <div id="loginForm" class="login-container">
        <div class="login-box">
            <h2>Staff Login</h2>
            <form id="staffLoginForm">
                <div class="form-group">
                    <label for="staffPassword">Password</label>
                    <input type="password" id="staffPassword" name="staffPassword" required placeholder="Enter password">
                </div>
                <button type="submit" class="submit-btn">Login</button>
            </form>
            <p id="loginError" class="error-message" style="display: none;">Incorrect password</p>
        </div>
    </div>

    <div id="staffPanel" class="staff-panel" style="display: none;">
        <div class="panel-header">
            <h2>Staff Panel</h2>
            <button class="logout-btn" id="logoutBtn">Logout</button>
        </div>

        <div class="edit-section">
            <h3>Edit Announcement</h3>
            <form id="announcementForm">
                <div class="form-group">
                    <label for="announcementInput">Announcement Text</label>
                    <input type="text" id="announcementInput" name="announcementInput" required placeholder="Enter announcement text">
                </div>
                <button type="submit" class="submit-btn">Update Announcement</button>
            </form>
        </div>

        <div class="reports-section">
            <h3>Submitted Reports</h3>
            <div id="reportsList" class="reports-container">
                <!-- Reports will be loaded here -->
            </div>
        </div>
    </div>

    <footer>
        <p>&copy; 2026 PotatoSMP. All rights reserved.</p>
    </footer>

    <script src="js/main.js"></script>
    <script src="js/staff.js"></script>
</body>
</html>
